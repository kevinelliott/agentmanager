version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - whitespace
  disable:
    - depguard
    - err113
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - godot
    - godox
    - lll
    - mnd
    - nlreturn
    - testpackage
    - wrapcheck
    - wsl
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - hugeParam
        - paramTypeCombine
        - regexpSimplify
        - rangeValCopy
        - emptyStringTest
        - httpNoBody
        - nestingReduce
        - sprintfQuotedString
        - unnamedResult
        - stringXbytes
        # importShadow: we deliberately shadow 'agent' (pkg/agent) and
        # 'status' (grpc/status) with local vars in test/helper scopes.
        # The rule adds noise without catching real bugs here.
        - importShadow
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 25
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gosec
          - govet
          - prealloc
          - staticcheck
        path: _test\.go
      - linters:
          - dupl
        path: pkg/platform/
      - path: _test\.go
        text: dot-imports
      - linters:
          - errcheck
        path: pkg/detector/strategies/
        text: ParseVersion
      - linters:
          - errcheck
        path: pkg/ipc/
      - linters:
          - errcheck
        path: pkg/platform/
        text: Run
      - linters:
          - errcheck
        path: pkg/installer/providers/
        text: ParseVersion
      - linters:
          - errcheck
        path: pkg/api/
      - linters:
          - errcheck
        path: internal/cli/
        text: Scanln|Encode|Disconnect
      - linters:
          - errcheck
        path: internal/systray/
      - linters:
          - goconst
        path: pkg/installer/
      - linters:
          - goconst
        path: internal/cli/
      - linters:
          - misspell
        path: pkg/storage/
        text: cancelled
      - linters:
          - prealloc
        text: Consider preallocating
      - linters:
          - staticcheck
        text: SA9003
      - linters:
          - gosec
        text: G306
      - linters:
          - unused
        path: cmd/
        text: version|commit|date
      - linters:
          - goconst
        path: pkg/detector/strategies/
      - linters:
          - gosec
        path: pkg/detector/strategies/
        text: G204
      # G703 ("Path traversal via taint analysis") fires on any os.ReadFile /
      # os.Remove whose path was constructed from a variable. Every flagged
      # site on this codebase builds the path from platform.GetConfigDir /
      # platform.GetDataDir / catalog-driven package names, never from
      # untrusted user input. Suppress globally rather than smear //nolint
      # comments across every call site.
      - linters:
          - gosec
        text: G703
      # noctx fires on os/exec.Command, net.Listen, httptest.NewRequest
      # and friends — all of which have ctx-aware alternatives but where
      # adopting them adds ceremony without correctness value in this
      # codebase (subprocess commands that do take ctx use CommandContext;
      # test helpers legitimately don't need a context). Re-enable per-file
      # later if a specific site would benefit.
      - linters:
          - noctx
        path: .*
    paths:
      - vendor
      - third_party
      - testdata
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kevinelliott/agentmanager
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party
      - testdata
      - third_party$
      - builtin$
      - examples$
